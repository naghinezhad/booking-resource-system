services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: booking_app
    ports:
      - "8080:8080"
    env_file:
      - ../.env
    depends_on:
      - mongo
      - redis
    networks:
      - booking_network
    restart: unless-stopped

  mongo:
    image: mongo:latest
    container_name: booking_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - booking_network
    restart: unless-stopped

  redis:
    image: redis:latest
    container_name: booking_redis
    ports:
      - "6379:6379"
    networks:
      - booking_network
    restart: unless-stopped

volumes:
  mongo_data:

networks:
  booking_network:
    driver: bridge
